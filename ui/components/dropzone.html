
<div class="cp-dropzone" id="dropzone" role="button" tabindex="0" aria-label="Upload PDF files">
  <div class="cp-dropzone__inner">
    <div class="cp-dropzone__icon">📂</div>
    <p class="cp-dropzone__title">Drop your PDF here</p>
    <p class="cp-dropzone__sub">or <span class="cp-dropzone__browse">browse files</span></p>
    <p class="cp-dropzone__hint">Files stay on your device — nothing is uploaded</p>
  </div>
  <input type="file" id="fileInput" class="cp-dropzone__input" accept=".pdf" />
</div>
