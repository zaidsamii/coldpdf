<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tool — ColdPDF</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;color:#fff;font-family:monospace;font-size:13px;min-height:100vh;display:flex;flex-direction:column}
    a{color:#aaa;text-decoration:none}a:hover{color:#fff}
    nav{border-bottom:1px solid #222;padding:10px 20px;display:flex;gap:16px;align-items:center}
    .brand{font-weight:bold;font-size:15px;color:#fff}
    .back{font-size:12px;color:#444}
    main{flex:1;max-width:660px;width:100%;margin:0 auto;padding:28px 20px}
    .tool-header{margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid #111}
    .tool-header .icon{font-size:22px;margin-bottom:6px}
    .tool-header h1{font-size:18px;margin-bottom:3px}
    .tool-header p{font-size:11px;color:#555}
    .sec{display:flex;align-items:center;gap:8px;border:1px solid #111;background:#030303;padding:7px 10px;border-radius:3px;margin-bottom:18px;font-size:10px;color:#333}
    .sec b{color:#555}

    .dz{border:1px dashed #222;border-radius:3px;padding:36px 20px;text-align:center;cursor:pointer;position:relative;transition:.15s}
    .dz:hover,.dz.over{border-color:#555;background:#080808}
    .dz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .dz-icon{font-size:26px;margin-bottom:8px}
    .dz-title{font-size:13px;margin-bottom:3px}
    .dz-sub{font-size:11px;color:#444}
    .dz-hint{font-size:10px;color:#222;margin-top:6px}

    #fileList{margin:10px 0}
    .fi{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border:1px solid #111;border-radius:3px;margin-bottom:4px;background:#050505}
    .fi-name{font-size:11px}.fi-size{font-size:10px;color:#333}
    .fi-rm{background:none;border:none;color:#333;cursor:pointer;font-size:13px}.fi-rm:hover{color:#f55}

    .opts{border:1px solid #111;padding:10px;border-radius:3px;margin:12px 0}
    .opts-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#333;margin-bottom:8px}
    .opt-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px;color:#555}
    .opt-row input[type=text],.opt-row input[type=password]{background:#080808;border:1px solid #1a1a1a;border-radius:2px;padding:5px 8px;color:#fff;font-family:monospace;font-size:11px;flex:1}
    .opt-row input[type=range]{flex:1;accent-color:#fff}
    .opt-row label{display:flex;align-items:center;gap:5px;cursor:pointer}
    input.full{background:#080808;border:1px solid #1a1a1a;border-radius:2px;padding:7px 10px;color:#fff;font-family:monospace;font-size:12px;width:100%;margin-bottom:6px}

    .btn-process{display:block;width:100%;padding:11px;background:#fff;color:#000;border:none;border-radius:3px;font-family:monospace;font-size:13px;font-weight:bold;cursor:pointer;margin-top:10px;transition:.15s}
    .btn-process:hover{background:#ddd}
    .btn-process:disabled{background:#111;color:#333;cursor:not-allowed}

    #progressWrap{display:none;margin:14px 0}
    .prog-hdr{display:flex;justify-content:space-between;font-size:10px;color:#444;margin-bottom:5px}
    .prog-track{height:3px;background:#111;border-radius:2px;overflow:hidden}
    .prog-fill{height:100%;background:#fff;border-radius:2px;transition:width .3s}
    .prog-note{font-size:10px;color:#222;margin-top:4px;text-align:center}

    #downloadWrap{display:none;margin-top:18px;padding-top:16px;border-top:1px solid #111}
    .dl-ok{font-size:12px;color:#777;margin-bottom:10px}
    .btn-dl{display:block;width:100%;padding:11px;background:#fff;color:#000;border:none;border-radius:3px;font-family:monospace;font-size:13px;font-weight:bold;cursor:pointer;margin-bottom:7px}
    .btn-dl:hover{background:#ddd}
    .btn-reset{background:none;border:none;color:#333;font-family:monospace;font-size:11px;cursor:pointer;display:block;width:100%;padding:5px}
    .btn-reset:hover{color:#fff}
    footer{border-top:1px solid #0f0f0f;padding:10px 20px;font-size:10px;color:#1a1a1a;display:flex;justify-content:space-between}
  </style>
</head>
<body>

<nav>
  <span class="brand">❄ ColdPDF</span>
  <a class="back" href="../index.html">← All Tools</a>
</nav>

<main>
  <div class="tool-header">
    <div class="icon" id="tIcon"></div>
    <h1 id="tName"></h1>
    <p id="tDesc"></p>
  </div>

  <div class="sec">🔒 <b>Files never leave your device</b> — all processing in browser only</div>

  <div class="dz" id="dropzone">
    <div class="dz-icon">📂</div>
    <div class="dz-title" id="dzTitle">Drop file here</div>
    <div class="dz-sub" id="dzSub">or click to browse</div>
    <div class="dz-hint">Nothing is uploaded</div>
    <input type="file" id="fileInput">
  </div>

  <div id="fileList"></div>

  <div class="opts" id="optsArea" style="display:none">
    <div class="opts-title">Options</div>
    <div id="optsContent"></div>
  </div>

  <button class="btn-process" id="processBtn" disabled id="processBtn">Process</button>

  <div id="progressWrap">
    <div class="prog-hdr"><span id="progLabel">Processing...</span><span id="progPct">0%</span></div>
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-note">🔒 Running in your browser</div>
  </div>

  <div id="downloadWrap">
    <div class="dl-ok" id="dlMsg">✅ Done!</div>
    <button class="btn-dl" id="downloadBtn">⬇ Download</button>
    <button class="btn-reset" id="resetBtn">← Process another file</button>
  </div>
</main>

<footer>
  <span id="footerFile">tool.html</span>
  <span>❄ ColdPDF test build · add new tool in TOOLS config below</span>
</footer>

<script src="../core/utils/file-handler.js"></script>
<script src="../core/utils/bridge.js"></script>

var toolId = new URLSearchParams(window.location.search).get('tool') || 'merge';
var T = TOOLS[toolId];

if (!T) {
  document.body.innerHTML = '<div style="padding:40px;color:#f55">Unknown tool: ' + toolId + '<br><a href="../index.html" style="color:#aaa">← Back</a></div>';
  throw new Error('Unknown tool');
}

document.title = T.name + ' — ColdPDF';
document.getElementById('tIcon').textContent = T.icon;
document.getElementById('tName').textContent = T.name;
document.getElementById('tDesc').textContent = T.desc;
document.getElementById('dzTitle').textContent = T.dzTitle;
document.getElementById('processBtn').textContent = T.btnLabel;
document.getElementById('footerFile').textContent = 'tool.html?tool=' + toolId;

var fi = document.getElementById('fileInput');
fi.accept = T.accept;
if (T.multiple) fi.setAttribute('multiple', '');

if (T.options && T.options.length > 0) {
  document.getElementById('optsArea').style.display = 'block';
  var oc = document.getElementById('optsContent');
  T.options.forEach(function(o) {
    var row = document.createElement('div');
    row.className = 'opt-row';
    if (o.type === 'text' || o.type === 'password') {
      row.innerHTML = '<span>' + o.label + '</span><input type="' + o.type + '" id="' + o.id + '" placeholder="' + (o.placeholder||'') + '">';
    } else if (o.type === 'range') {
      row.innerHTML = '<span>' + o.label + '</span><span style="color:#333">' + o.leftLabel + '</span><input type="range" id="' + o.id + '" min="' + o.min + '" max="' + o.max + '" value="' + o.value + '"><span style="color:#333">' + o.rightLabel + '</span>';
    } else if (o.type === 'radio') {
      row.innerHTML = '<span>' + o.label + '</span>' + o.choices.map(function(c, i) {
        return '<label><input type="radio" name="' + o.name + '" value="' + c.value + '"' + (i===0?' checked':'') + '> ' + c.label + '</label>';
      }).join('');
    }
    oc.appendChild(row);
  });
}

var files = [];
var resultBuffer = null;

var dz = document.getElementById('dropzone');
var pb = document.getElementById('processBtn');
var progWrap = document.getElementById('progressWrap');
var dlWrap = document.getElementById('downloadWrap');

dz.addEventListener('dragover', function(e){ e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', function(){ dz.classList.remove('over'); });
dz.addEventListener('drop', function(e){
  e.preventDefault(); dz.classList.remove('over');
  addFiles(Array.from(e.dataTransfer.files));
});
fi.addEventListener('change', function(){
  addFiles(Array.from(fi.files));
  fi.value = '';
});

function addFiles(newFiles) {
  if (T.multiple) {
    files = files.concat(newFiles.filter(function(f){ return matchAccept(f); }));
  } else {
    files = newFiles.filter(function(f){ return matchAccept(f); }).slice(0,1);
  }
  renderList();
}

function matchAccept(f) {
  var exts = T.accept.split(',');
  return exts.some(function(ext){ return f.name.toLowerCase().endsWith(ext.trim()); });
}

function renderList() {
  var fl = document.getElementById('fileList');
  fl.innerHTML = '';
  var minFiles = T.skipFileRequired ? 0 : (T.minFiles || 1);
  files.forEach(function(f, i){
    var d = document.createElement('div');
    d.className = 'fi';
    d.innerHTML = '<span class="fi-name">' + f.name + '</span><span class="fi-size">' + (f.size/1024).toFixed(0) + ' KB</span><button class="fi-rm" data-i="' + i + '">✕</button>';
    fl.appendChild(d);
  });
  fl.querySelectorAll('.fi-rm').forEach(function(btn){
    btn.addEventListener('click', function(){
      files.splice(parseInt(btn.dataset.i), 1);
      renderList();
    });
  });
  pb.disabled = files.length < minFiles;
  if (files.length === 1 && !T.multiple) {
    document.getElementById('dzTitle').textContent = files[0].name;
  }
}

pb.addEventListener('click', function() {
  if (!files.length && !T.skipFileRequired) return;
  pb.disabled = true;
  progWrap.style.display = 'block';
  setProgress(10, 'Reading files...');

  Promise.all(files.map(function(f){ return readFileAsBuffer(f); }))
  .then(function(buffers) {
    setProgress(20, 'Starting worker...');
    var opts = getOptions();
    return runWorker(T.workerPath, buffers, opts, function(pct, label) {
      setProgress(pct, label || 'Processing...');
    });
  })
  .then(function(result) {
    resultBuffer = result;
    setProgress(100, 'Done!');
    setTimeout(function(){
      progWrap.style.display = 'none';
      dlWrap.style.display = 'block';
      document.getElementById('dlMsg').textContent = '✅ ' + T.name + ' complete!';
      document.getElementById('downloadBtn').textContent = '⬇ Download ' + T.dlName;
    }, 400);
  })
  .catch(function(err) {
    alert('Error: ' + err.message);
    progWrap.style.display = 'none';
    pb.disabled = false;
  });
});

function setProgress(pct, label) {
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progPct').textContent = pct + '%';
  document.getElementById('progLabel').textContent = label;
}

function getOptions() {
  var opts = {};
  if (!T.options) return opts;
  T.options.forEach(function(o) {
    if (o.type === 'radio') {
      var el = document.querySelector('input[name="' + o.name + '"]:checked');
      if (el) opts[o.name] = el.value;
    } else if (o.id) {
      var el = document.getElementById(o.id);
      if (el) opts[o.id] = el.value;
    }
  });
  return opts;
}

document.getElementById('downloadBtn').addEventListener('click', function(){
  if (resultBuffer) {
    downloadBuffer(resultBuffer, T.dlName, T.dlMime || 'application/pdf');
  }
});

document.getElementById('resetBtn').addEventListener('click', function(){
  files = [];
  resultBuffer = null;
  renderList();
  dlWrap.style.display = 'none';
  progWrap.style.display = 'none';
  pb.disabled = true;
  document.getElementById('dzTitle').textContent = T.dzTitle;
});

</script>
